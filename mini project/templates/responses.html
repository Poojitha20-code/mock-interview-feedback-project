<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Interview Responses</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      justify-content: flex-start;
      padding-top: 40px;
    }
    .glass-card {
      width: 95%;
      max-width: 1200px;
      margin: auto;
    }
    table {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    thead {
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: white;
    }
    td, th {
      text-align: center;
      vertical-align: middle;
    }
    .btn-custom {
      background: linear-gradient(90deg, #ff6a00, #ee0979);
      color: white;
      border: none;
      font-weight: bold;
      border-radius: 10px;
      padding: 10px 20px;
      transition: 0.3s;
    }
    .btn-custom:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="glass-card p-4">
    <h2 class="text-center mb-4">📑 My Interview Responses ({{ username }})</h2>

    <table class="table table-bordered table-hover">
      <thead>
        <tr>
          <th>Question</th>
          <th>Answer</th>
          <th>Grammar</th>
          <th>Fluency</th>
          <th>Clarity</th>
          <th>Feedback</th>
        </tr>
      </thead>
      <tbody>
        {% for row in responses %}
        <tr>
          <td>{{ row[2] }}</td>
          <td>{{ row[3] }}</td>
          <td>{{ row[4] }}%</td>
          <td>{{ row[5] }}%</td>
          <td>{{ row[6] }}%</td>
          <td>{{ row[7] | safe }}</td>   <!-- ✅ Now feedback shows with colors -->
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <div class="text-center mt-4">
      <a href="/" class="btn btn-custom">🏠 Go to Home</a>
      <a href="/summary" class="btn btn-custom">📊 View Summary</a>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mock Interview Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: url("https://img.freepik.com/free-vector/hand-drawn-flat-design-job-interview-illustration_23-2149155876.jpg") 
        no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }
    .card {
      width: 380px;
      border-radius: 20px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
      animation: fadeInUp 0.8s ease-in-out;
    }
    .card h3 {
      font-weight: bold;
      color: #333;
    }
    .form-control {
      border-radius: 10px;
    }
    .btn-custom {
      background: linear-gradient(90deg, #667eea, #764ba2);
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 10px;
      padding: 10px;
      transition: 0.3s;
    }
    .btn-custom:hover {
      background: linear-gradient(90deg, #764ba2, #667eea);
    }
    .error {
      color: red;
      text-align: center;
      font-size: 14px;
      margin-bottom: 10px;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="card">
    <h3 class="text-center mb-3">Mock Interview Login</h3>
    
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/signin">
      <div class="mb-3">
        <input type="text" name="username" class="form-control" placeholder="Enter your name" required>
      </div>
      <button type="submit" class="btn btn-custom w-100">Join Interview</button>
    </form>
  </div>
</body>
</html>

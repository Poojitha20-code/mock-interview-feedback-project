<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mock Interview - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .btn-custom {
      background: linear-gradient(90deg, #36d1dc, #5b86e5);
      border: none;
      padding: 12px 30px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      border-radius: 30px;
      transition: 0.3s;
    }
    .btn-custom:hover {
      background: linear-gradient(90deg, #5b86e5, #36d1dc);
    }
  </style>
</head>
<body>
  <div>
    <h1 class="animate__animated animate__fadeInDown">🚀 Mock Interview Feedback System</h1>
    <p class="lead animate__animated animate__fadeInUp">Practice your interview skills and get instant feedback.</p>
    <a href="/signin" class="btn btn-custom animate__animated animate__zoomIn">Get Started</a>
  </div>
</body>
</html>

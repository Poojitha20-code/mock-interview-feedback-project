<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mock Interview - Question</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: url("https://img.freepik.com/free-vector/recruitment-agency-search-job-online-interview_335657-3133.jpg") 
        no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, rgba(102,126,234,0.7), rgba(118,75,162,0.7));
      z-index: -1;
    }
    .question-card {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 30px;
      width: 600px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      animation: fadeInUp 0.8s ease-in-out;
      text-align: center;
    }
    h2 {
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }
    .question-text {
      font-size: 1.2rem;
      color: #444;
      margin-bottom: 20px;
    }
    textarea {
      border-radius: 10px;
      padding: 10px;
      resize: none;
    }
    .btn-gradient {
      background: linear-gradient(90deg, #667eea, #764ba2);
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 30px;
      padding: 12px 20px;
      width: 100%;
      transition: 0.3s;
    }
    .btn-gradient:hover {
      transform: scale(1.05);
      background: linear-gradient(90deg, #764ba2, #667eea);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="question-card">
    <h2>📖 Question {{ q_index }} of {{ total }}</h2>
    <p class="question-text">❓ {{ question }}</p>
    <form method="POST" action="/feedback">
      <textarea class="form-control mb-3" name="answer" rows="5" placeholder="✍️ Type your answer here..." required></textarea>
      <button type="submit" class="btn-gradient">🚀 Submit Answer</button>
    </form>
  </div>
</body>
</html>
